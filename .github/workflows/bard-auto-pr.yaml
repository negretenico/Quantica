name: Bard Auto PR

on:
  push:
    branches: [bard-updates]

jobs:
  auto-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create PR if none exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --head bard-updates --base main --state open --json number --jq '.[0].number')
          if [[ -n "$EXISTING" ]]; then
            echo "PR #$EXISTING already open — skipping"
          else
            gh pr create \
              --base main \
              --head bard-updates \
              --title "chore: market bard story updates" \
              --body "Automated daily market narrative committed by marketbard."
          fi
