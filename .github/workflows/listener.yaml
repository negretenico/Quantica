name: Listener Service CI/CD
permissions:
  contents: read
  packages: write
on:
  push:
    paths:
      - 'marketListener/**'
      - 'shared/**'
    branches: [ main, develop ]
  pull_request:
    paths:
      - 'marketListener/**'
      - 'shared/**'
  workflow_dispatch:

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      should-build: ${{ steps.changes.outputs.marketListener == 'true' || steps.changes.outputs.shared == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            marketListener:
              - 'marketListener/**'
            shared:
              - 'shared/**'

  java-build:
    needs: check-changes
    if: needs.check-changes.outputs.should-build == 'true'
    uses: ./.github/workflows/reusable-java-build.yaml
    with:
      working_directory: ./marketListener
      java_version: '21'
      skip_tests: false
      artifact_name: marketListener-jar
    secrets: inherit

  prepare-docker-context:
    needs: java-build
    if: needs.check-changes.outputs.should-build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Download artifact from java-build
        uses: actions/download-artifact@v4
        with:
          name: marketListener-jar
          path: ./marketListener/

  docker-deploy:
    uses: ./.github/workflows/reusable-docker-build.yaml
    if: needs.check-changes.outputs.should-build == 'true'
    needs: prepare-docker-context
    with:
      working_directory: ./marketListener
      dockerfile_path: ./Dockerfile
      service_name: marketListener
      artifact_name: marketListener-jar
    secrets: inherit

  ecs-deploy:
    uses: ./.github/workflows/reusable-ecs-deploy.yaml
    needs: [check-changes, docker-deploy]
    if: github.ref == 'refs/heads/main' && needs.check-changes.outputs.should-build == 'true'
    with:
      service_name: marketlistener
      container_name: marketlistener
      task_definition_path: .aws/task-definitions/marketlistener.json
      image_uri: ghcr.io/negretenico/quantica/marketlistener:marketlistener-latest
    secrets: inherit