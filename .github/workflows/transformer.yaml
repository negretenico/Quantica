name: Market Transformer Service CI/CD
permissions:
  contents: read
  packages: write
  id-token: write
on:
  push:
    paths:
      - 'markettransformer/**'
      - 'shared/**'
    branches: [ main, develop ]
  pull_request:
  workflow_dispatch:

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      should-build: ${{ github.event_name == 'workflow_dispatch' || steps.changes.outputs.markettransformer == 'true' || steps.changes.outputs.shared == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            markettransformer:
              - 'markettransformer/**'
            shared:
              - 'shared/**'

  java-build:
    needs: check-changes
    if: needs.check-changes.outputs.should-build == 'true'
    uses: ./.github/workflows/reusable-java-build.yaml
    with:
      working_directory: ./markettransformer
      java_version: '21'
      skip_tests: false
      artifact_name: markettransformer-jar
      publish: ${{ github.event_name != 'pull_request' }}
    secrets: inherit

  prepare-docker-context:
    needs: java-build
    if: needs.check-changes.outputs.should-build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Download artifact from java-build
        uses: actions/download-artifact@v4
        with:
          name: markettransformer-jar
          path: ./markettransformer/

  docker-deploy:
    uses: ./.github/workflows/reusable-docker-build.yaml
    if: needs.check-changes.outputs.should-build == 'true'
    needs: prepare-docker-context
    with:
      working_directory: ./markettransformer
      dockerfile_path: ./Dockerfile
      service_name: markettransformer
      artifact_name: markettransformer-jar
    secrets: inherit

  build-gate:
    needs: [check-changes, java-build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check build result
        run: |
          BUILD_NEEDED="${{ needs.check-changes.outputs.should-build }}"
          BUILD_RESULT="${{ needs.java-build.result }}"
          if [[ "$BUILD_NEEDED" == "true" && "$BUILD_RESULT" != "success" ]]; then
            echo "Build failed or was cancelled"
            exit 1
          fi
          echo "OK (build needed: $BUILD_NEEDED, result: $BUILD_RESULT)"

