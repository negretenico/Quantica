services:
  kafka-controller:
    image: apache/kafka-native:4.0.0
    container_name: quantica-kafka-controller
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:9093
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@quantica-kafka-controller:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT
      KAFKA_CLUSTER_ID: ${KAFKA_CLUSTER_ID}

  kafka-broker-1:
    image: apache/kafka-native:4.0.0
    container_name: quantica-kafka-broker-1
    depends_on:
      - kafka-controller
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://quantica-kafka-broker-1:29092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@quantica-kafka-controller:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_CLUSTER_ID: ${KAFKA_CLUSTER_ID}
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  kafka-broker-2:
    image: apache/kafka-native:4.0.0
    container_name: quantica-kafka-broker-2
    depends_on:
      - kafka-controller
    ports:
      - "9094:9092"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9094,PLAINTEXT_INTERNAL://quantica-kafka-broker-2:29092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@quantica-kafka-controller:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_CLUSTER_ID: ${KAFKA_CLUSTER_ID}
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: quantica-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  marketlistener:
    build:
      context: ./marketListener
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    container_name: quantica-marketlistener
    depends_on:
      kafka-broker-1:
        condition: service_healthy
      kafka-broker-2:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      KAFKA_BOOTSTRAP: quantica-kafka-broker-1:29092,quantica-kafka-broker-2:29092
      BINANCE_SYMBOLS: ${BINANCE_SYMBOLS:-btcusdt@trade}
      KAFKA_ORDER_TOPIC_REPLICATION_FACTOR: 2
    ports:
      - "8080:8080"

  markettransformer:
    build:
      context: ./markettransformer
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    depends_on:
      kafka-broker-1:
        condition: service_healthy
      kafka-broker-2:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      KAFKA_BOOTSTRAP: quantica-kafka-broker-1:29092,quantica-kafka-broker-2:29092
      SPRING_RABBITMQ_HOST: quantica-rabbitmq
      RABBITMQ_MANAGEMENT_URL: http://guest:guest@quantica-rabbitmq:15672
    ports:
      - "8080"

  marketanalysis:
    build:
      context: ./marketanalysis
      additional_contexts:
        shared: ./shared
    container_name: quantica-marketanalysis
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_URL: amqp://guest:guest@quantica-rabbitmq/
      ANALYTICS_EXCHANGE: analytics
    ports:
      - "5000:5000"

  marketbard:
    build:
      context: ./marketbard
      additional_contexts:
        shared: ./shared
    container_name: quantica-marketbard
    depends_on:
      rabbitmq:
        condition: service_healthy
    env_file: .env
    environment:
      RABBITMQ_URL: amqp://guest:guest@quantica-rabbitmq/
      ANALYTICS_EXCHANGE: analytics

  marketappendonly:
    build:
      context: ./marketappendonly
    container_name: quantica-marketappendonly
    depends_on:
      kafka-broker-1:
        condition: service_healthy
      kafka-broker-2:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: quantica-kafka-broker-1:29092,quantica-kafka-broker-2:29092

  prometheus:
    image: prom/prometheus:latest
    container_name: quantica-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: quantica-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
